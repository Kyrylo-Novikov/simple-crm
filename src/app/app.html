<mat-drawer-container autosize>
  <mat-drawer #drawer class="sidenav" mode="side" [opened]="true">
    <div class="logo-container"><img src="img/simple-crm.png" alt="" srcset="" /></div>
    <ul class="menu">
      <li routerLink="/">
        <mat-icon><span class="material-symbols-outlined"> space_dashboard </span></mat-icon>
        Dashboard
      </li>

      <li routerLink="/user">
        <mat-icon><span class="material-symbols-outlined"> person </span></mat-icon>User
      </li>

      <li></li>
      <li></li>
    </ul>
  </mat-drawer>
  <mat-toolbar class="toolbar">
    <mat-toolbar-row>
      <mat-icon matButton (click)="drawer.toggle()">menu</mat-icon>
      <span>Simple CRM</span>
    </mat-toolbar-row>
  </mat-toolbar>
  <div class="router-container"><router-outlet /></div>
</mat-drawer-container>
